<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatBot</title>
    <link rel="stylesheet" href="./src/output.css" />
    <!-- <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=robot_2"
    /> -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>
  <body class="relative h-screen">
    <!-- <h1 class="bg-amber-300 text-white text-xl">Hello</h1> -->
    <header class="h-[10%]">
      <nav
        class="h-full bg-slate-950/70 backdrop-blur-md border-b border-slate-800 flex items-center justify-between px-5"
      >
        <p
          class="text-indigo-400 font-semibold text-xl tracking-tight hover:text-white transition"
        >
          AuralisAI
        </p>
        <div class="btns flex gap-3">
          <button
            class="bg-indigo-500 hover:bg-indigo-600 text-white font-medium px-3 py-2 rounded-lg shadow-lg shadow-indigo-500/20 transition-all duration-200 hover:shadow-indigo-500/30 hover:scale-[1.02]"
          >
            Login</button
          ><button
            class="border border-slate-700 text-slate-300 hover:bg-slate-800 px-3 py-2 rounded-lg transition-all duration-200 hover:border-slate-500"
          >
            Sign UP
          </button>
        </div>
      </nav>
    </header>
    <section class="h-screen bg-slate-900">
      <div
        class="min-h-screen flex flex-col justify-center px-6 md:px-16 max-w-6xl mx-auto gap-6"
      >
        <h1
          class="text-5xl md:text-6xl font-semibold tracking-tight leading-snug bg-linear-to-r from-indigo-400 via-violet-400 to-cyan-300 text-transparent bg-clip-text"
        >
          Your Intelligent AI Assistant for Everything You Ask
        </h1>
        <h3
          class="text-base md:text-lg text-slate-400 leading-relaxed max-w-xl"
        >
          Ask questions, generate ideas, write content, and get instant answers
          with a powerful AI chatbot built for speed and clarity.
        </h3>
        <div class="btns flex gap-3">
          <button
            class="bg-indigo-500 hover:bg-indigo-600 text-white font-medium px-6 py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all duration-200 hover:shadow-indigo-500/30 hover:scale-[1.02]"
          >
            Start Chatting</button
          ><button
            class="border border-slate-700 text-slate-300 hover:bg-slate-800 px-6 py-3 rounded-xl transition-all duration-200 hover:border-slate-500"
          >
            View Features
          </button>
        </div>
      </div>
    </section>
    <!-- <section class="h-screen bg-amber-500"></section>
    <section class="h-screen bg-green-500"></section> -->
    <div
      class="fixed right-5 bottom-10 text-white flex justify-center items-center"
    >
      <div class="chatbox h-[75vh] w-[25vw] hidden">
        <div
          class="chatbotHeader h-[10%] bg-gray-700 text-gray-300 border-b border-b-black flex items-center justify-between px-3"
        >
          <div class="flex flex-col items-center justify-center">
            <p class="text-sm text-gray-200">
              Built by <span class="font-semibold">Ahmad Mahboob</span>
            </p>
          </div>
          <button
            id="closeChatBtn"
            class="closeChatBtn text-white text-xl cursor-pointer"
          >
            <span class="material-symbols-outlined"> close </span>
          </button>
        </div>
        <div
          class="chatbotContent relative bg-slate-900 h-[75%] p-3 flex flex-col gap-3 overflow-y-auto scrollbar-thin scrollbar-thumb-indigo-500 scrollbar-track-gray-200"
        >
          <div class="chatbotMessage">
            <!-- <img
              src="./assets/bot.svg"
              alt="Bot"
              class="h-lh w-lh rounded-[50%] text-white border border-black"
            /> -->
            Hey, how can I help you?
          </div>
        </div>
        <div class="chatbotMessageBox bg-gray-900 h-[15%] py-2 px-3 flex gap-2">
          <textarea
            type="text"
            id="userMessageInput"
            cols="40"
            placeholder="Ask me...."
            class="w-4/5 border-2 focus:outline-none bg-gray-900 border-gray-700 text-gray-50 placeholder-gray-400 p-2 text-wrap overflow-y-auto scrollbar-thin scrollbar-thumb-indigo-500 scrollbar-track-gray-200"
          ></textarea>

          <button
            class="sendMessageBtn p-2 bg-blue-500 hover:bg-blue-600 rounded-xl w-1/5"
          >
            Send
          </button>
        </div>
      </div>
      <button
        id="startChatBtn"
        class="h-14 w-14 rounded-full bg-indigo-500 cursor-pointer"
      >
        <span class="material-symbols-outlined"> robot_2 </span>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
